<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dragon Slider</title>
  <link rel="stylesheet" href="assets/style.css" />

</head>
<body>
  <div class="slider-container">
    <!-- Left text section -->
    <div class="slider-content">
      <h1 id="dragon-title">Stormrunner</h1>
      <p id="dragon-desc">
        Lorem ipsum dolor sit amet, consectetur adipisicing elit. Doloremque alias dolores ut quam cum atque eaque excepturi, maxime doloribus suscipit eum est iure nam quos.
      </p>
      <button id="view-more">View More</button>
    </div>

    <!-- Right image section -->
    <div class="slider-image">
      <img id="dragon-img" src="images/img1.png" alt="Stormrunner" />
        <div class="controls">
        <div class="control-btn active" data-image="images/img1.png" data-index="0"></div>
        <div class="control-btn" data-image="images/img2.png" data-index="1"></div>
        <div class="control-btn" data-image="images/img3.png" data-index="2"></div>
        <div class="control-btn" data-image="images/img4.png" data-index="3"></div>
        <div class="control-btn" data-image="images/img5.png" data-index="4"></div>
        </div>
    </div>
  </div>

<script src="assets/script.js"></script>

</body>
</html>

Project Title

Animated Dragon Slider – Fantasy Creature Showcase

2. Project Overview

The Animated Dragon Slider is a responsive, interactive web component built using HTML, CSS, and JavaScript.
It allows users to browse through a collection of uniquely designed dragons, each with its own theme color, background gradient, and description. Smooth animations are applied to text, images, and the background when switching between dragons.

This project is designed as a UI/UX showcase, suitable for portfolio use, creative websites, or themed interactive displays.

3. Objectives

Create an interactive slider for themed fantasy characters.

Implement smooth animations for image, text, and background transitions.

Keep the design responsive for desktop and mobile.

Use vanilla JavaScript without dependencies to ensure easy deployment.

4. Key Features

Multiple Dragons: Each with unique color schemes and descriptions.

Animated Transitions:

Fade and slide-in for text.

Scale and fade for images.

Gradient background transitions.

Control Panel: Color-coded circular buttons for selecting a dragon.

Responsive Layout: Works on different screen sizes.

Lightweight: Pure HTML, CSS, and JavaScript — no frameworks.

5. Technology Stack

HTML5 – Structure and layout.

CSS3 – Styling, animations, and responsive design.

JavaScript (Vanilla) – Interactive functionality and content swapping.

6. How It Works

User Interaction: Clicking a color control button triggers a change.

Exit Animation: Current dragon’s image and text animate out.

Content Update: New dragon’s title, description, image, and background are loaded.

Entry Animation: The new content animates in smoothly.

Clone the repository:

git clone https://github.com/yourusername/dragon-slider.git
