<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />
    <link rel="stylesheet" href="style.css">
    <title>Classy Source Cards</title>
</head>

<body>
    <header class="floating-header">
        <h1 class="main-title">Nexus Gallery</h1>
    </header>

    <div class="container">
        <div class="card card-codepen">
            <div class="top"><i class="fa-brands fa-codepen"></i></div>
            <div class="bottom">
                <h1>CLOUD REPO</h1>
                <p>Deploy front-end snippets to global infrastructure with real-time previewing.</p>
            </div>
        </div>

        <div class="card card-js">
            <div class="top"><i class="fa-solid fa-code"></i></div>
            <div class="bottom">
                <h1>LOGIC ENGINE</h1>
                <p>Modular JavaScript architecture optimized for scalability and performance.</p>
            </div>
        </div>

        <div class="card card-css">
            <div class="top"><i class="fa-brands fa-css3"></i></div>
            <div class="bottom">
                <h1>STYLE CORE</h1>
                <p>Modern SASS architecture ensuring a consistent design system across apps.</p>
            </div>
        </div>
    </div>
</body>
</html>
